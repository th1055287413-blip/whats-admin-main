name: Deploy

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [pequod]
    environment: ${{ matrix.environment }}
    concurrency:
      group: deploy-${{ matrix.environment }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create .env.production
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_AGENT_BASE_URL: ${{ vars.VITE_AGENT_BASE_URL }}
        run: |
          cat > .env.production << EOF
          VITE_API_BASE_URL=${VITE_API_BASE_URL}
          VITE_AGENT_BASE_URL=${VITE_AGENT_BASE_URL}
          VITE_NODE_ENV=production
          EOF

      - name: Build
        run: npx vite build

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          
          # 1. 写入私钥
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # 2. 写入 SSH Config (使用 Here Document 语法，避免转义问题)
          cat > ~/.ssh/config << EOF
          Host deploy
            HostName ${{ secrets.DEPLOY_HOST }}
            User root
            Port ${{ secrets.DEPLOY_PORT }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
          EOF

          # 3. 验证配置是否生成正确 (调试用，可选)
          cat ~/.ssh/config

      - name: Deploy to server
        run: |
          tar -czf dist.tar.gz dist
          scp dist.tar.gz deploy:/tmp/dist.tar.gz

          DEPLOY_PATH="$(printf '%s' "${{ vars.DEPLOY_PATH }}" | tr -d '\n\r')"
          if [ -z "${DEPLOY_PATH}" ] || [ "${DEPLOY_PATH}" = "/" ]; then
            echo "::error::DEPLOY_PATH is empty or root, aborting"
            exit 1
          fi
          ssh deploy "set -e; mkdir -p /tmp/dist; tar -xzf /tmp/dist.tar.gz -C /tmp/dist; rm -rf ${DEPLOY_PATH}/*; cp -r /tmp/dist/dist/* ${DEPLOY_PATH}/; rm -rf /tmp/dist /tmp/dist.tar.gz; echo 'Deploy completed'"
